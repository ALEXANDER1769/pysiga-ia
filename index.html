<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PYSIGA - Análisis Estratégico IA</title>
    <style>
        /* Diseño profesional y limpio para PYSIGA */
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--primary); }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid var(--accent); padding-bottom: 10px; color: var(--primary); text-align: center; }
        p { text-align: center; color: #555; margin-bottom: 25px; }
        
        .form-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        input[type="email"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        
        button { width: 100%; padding: 15px; background-color: var(--accent); color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(39, 174, 96, 0.3); }
        button:hover { background-color: #219150; transform: translateY(-2px); }
        
        #resultadoIA { margin-top: 25px; padding: 20px; background: #e8f5e9; border-left: 5px solid var(--accent); border-radius: 6px; white-space: pre-wrap; line-height: 1.6; display: none; font-size: 15px; }
        #loading { margin-top: 20px; text-align: center; color: #2980b9; font-style: italic; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>🧠 Analista Experto PYSIGA</h2>
    <p>La Inteligencia Artificial leerá tus reportes de pesaje, leche y reproducción para generar un diagnóstico inmediato.</p>

    <div class="form-group">
        <label for="emailUsuario">Confirma tu correo de usuario (Login):</label>
        <input type="email" id="emailUsuario" placeholder="ej. alexdugarte@yahoo.com" required>
    </div>

    <button onclick="ejecutarAnalisisAutomatico()">🚀 Generar Análisis Estratégico con IA</button>

    <div id="loading">⏳ Extrayendo datos de la finca y consultando a la IA... por favor espera.</div>
    <div id="resultadoIA"></div>
</div>

<script>
    async function ejecutarAnalisisAutomatico() {
        const emailInput = document.getElementById('emailUsuario').value;
        const divRes = document.getElementById('resultadoIA');
        const divLoading = document.getElementById('loading');

        // Validación básica
        if (!emailInput.trim()) {
            alert("Por favor, ingresa tu correo para poder ubicar tu base de datos.");
            return;
        }

        // Mostrar estado de carga
        divRes.style.display = 'none';
        divLoading.style.display = 'block';

        try {
            // URL de TU Worker en Cloudflare
            const urlWorker = 'https://pysiga.d-alexjose.workers.dev';

            const response = await fetch(urlWorker, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    accion: "analisisFincaTotal", // Acción enlazada al Worker
                    email: emailInput.trim()      // Correo para buscar la hoja de Google
                })
            });

            const data = await response.json();

            // Ocultar estado de carga
            divLoading.style.display = 'none';
            divRes.style.display = 'block';

            if (data.ok) {
                // Si todo sale bien, mostramos el análisis de Gemini
                divRes.innerHTML = data.resultado.replace(/\n/g, '<br>'); // Formateo simple para saltos de línea
            } else {
                // Si el Worker o el Script dan error (ej. correo no registrado)
                divRes.innerHTML = `<span style="color:red"><b>Error:</b> ${data.error}</span>`;
            }

        } catch (error) {
            divLoading.style.display = 'none';
            divRes.style.display = 'block';
            divRes.innerHTML = `<span style="color:red"><b>Error de conexión:</b> No se pudo contactar al sistema. Verifica tu internet.</span>`;
            console.error("Error:", error);
        }
    }
</script>

</body>
</html>
